<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ဝင်ရောက်ရန် | မြန်မာ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #020617; line-height: 1.8; } .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }</style>
</head>
<body class="flex items-center justify-center min-h-screen text-slate-200 p-6">
    <div class="w-full max-w-md glass p-10 rounded-3xl">
        <div class="flex justify-between mb-8">
            <h1 class="text-xl font-bold">ဝင်ရောက်ရန်</h1>
            <a href="login.html" class="text-[10px] text-green-400 uppercase font-bold border border-green-500/20 px-3 py-1 rounded-full tracking-widest">ENGLISH</a>
        </div>
        <form class="space-y-4">
            <input type="email" placeholder="အသုံးပြုသူအမည်" class="w-full bg-slate-900 border border-white/10 rounded-xl p-4 text-sm">
            <input type="password" placeholder="လုံခြုံရေးကုဒ်" class="w-full bg-slate-900 border border-white/10 rounded-xl p-4 text-sm">
            <button type="button" onclick="window.location.href='dashboard-my.html'" class="w-full bg-green-500 text-black font-black py-4 rounded-xl text-xs">အတည်ပြုဝင်ရောက်မည်</button>
        </form>
    </div>
</body>
</html>
